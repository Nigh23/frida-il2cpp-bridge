name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码（升级到 v4，消除 Node.js 弃用警告）
    - uses: actions/checkout@v4

    # 2. 配置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    # 3. 安装系统依赖 + 项目 npm 依赖
    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y build-essential
        npm install

    # 4. 编译 TypeScript 代码（用 npx tsc 确保使用项目本地版本）
    - name: Build with TypeScript
      run: npx tsc --project tsconfig.json

    # 5. 上传构建产物（dist/ 目录）
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frida-il2cpp-bridge-build
        path: dist/
